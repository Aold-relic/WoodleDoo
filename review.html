<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave a Review | WoodleDoo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(244, 63, 94, 0.15), transparent 25%);
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center p-6 relative selection:bg-pink-500/30 selection:text-pink-200">
    
    <!-- Top Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800/50 px-8 py-5 flex justify-between items-center">
        <span class="font-black text-2xl tracking-widest text-slate-100 uppercase">WoodleDoo</span>
        <a href="about.html" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm font-medium tracking-wide">
            <span class="material-symbols-outlined text-lg">arrow_back</span>
            Back to About
        </a>
    </nav>

    <!-- Main Content -->
    <main class="w-full max-w-3xl mt-32 mb-12 animate-[fadeIn_0.6s_ease-out]">
        
        <!-- Review Section -->
        <div class="glass-card rounded-[2rem] p-10 hover:-translate-y-1 transition-transform duration-300">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-amber-500/10 border border-amber-500/20 p-4 rounded-2xl shadow-[0_0_20px_rgba(245,158,11,0.2)]">
                    <span class="material-symbols-outlined text-amber-400 text-3xl">star</span>
                </div>
                <div>
                    <h2 class="text-3xl font-semibold text-slate-100 tracking-tight">Leave a Review</h2>
                    <p class="text-slate-400 text-sm mt-1">We would love to hear your thoughts on WoodleDoo!</p>
                </div>
            </div>
            
            <form id="reviewForm" class="space-y-8" onsubmit="event.preventDefault(); alert('Thank you for your fantastic feedback!'); this.reset(); resetStars();">
                <!-- Star Rating -->
                <div class="flex flex-col gap-3">
                    <label class="text-sm text-slate-400 font-bold uppercase tracking-widest">Rate your experience</label>
                    <div class="flex items-center gap-2 cursor-pointer" id="starContainer">
                        <span class="star-btn material-symbols-outlined text-5xl text-slate-600 hover:-translate-y-1 transition-all" data-value="1">star</span>
                        <span class="star-btn material-symbols-outlined text-5xl text-slate-600 hover:-translate-y-1 transition-all" data-value="2">star</span>
                        <span class="star-btn material-symbols-outlined text-5xl text-slate-600 hover:-translate-y-1 transition-all" data-value="3">star</span>
                        <span class="star-btn material-symbols-outlined text-5xl text-slate-600 hover:-translate-y-1 transition-all" data-value="4">star</span>
                        <span class="star-btn material-symbols-outlined text-5xl text-slate-600 hover:-translate-y-1 transition-all" data-value="5">star</span>
                    </div>
                    <input type="hidden" id="ratingValue" name="rating" required>
                </div>

                <!-- Comment Box -->
                <div class="flex flex-col gap-3">
                    <label class="text-sm text-slate-400 font-bold uppercase tracking-widest" for="comment">Your Thoughts</label>
                    <textarea id="comment" name="comment" rows="6" placeholder="What do you think about WoodleDoo?" class="w-full bg-slate-800/50 border border-slate-700/50 rounded-2xl p-5 text-slate-200 placeholder:text-slate-500 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all resize-none shadow-inner text-lg" required></textarea>
                </div>

                <!-- Submit -->
                <button type="submit" class="bg-gradient-to-r from-[#38bdf8] to-[#818cf8] text-white font-bold text-xl px-10 py-4 rounded-2xl shadow-[0_4px_15px_rgba(56,189,248,0.3)] hover:shadow-[0_4px_25px_rgba(56,189,248,0.5)] hover:-translate-y-1 transition-all duration-300 w-full">
                    Submit Review
                </button>
            </form>
        </div>

    </main>

    <script>
        const stars = document.querySelectorAll('.star-btn');
        const ratingInput = document.getElementById('ratingValue');
        let currentRating = 0;

        stars.forEach(star => {
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.getAttribute('data-value'));
                highlightStars(value);
            });

            star.addEventListener('mouseleave', function() {
                highlightStars(currentRating);
            });

            star.addEventListener('click', function() {
                currentRating = parseInt(this.getAttribute('data-value'));
                ratingInput.value = currentRating;
                highlightStars(currentRating);
            });
        });

        function highlightStars(count) {
            stars.forEach(star => {
                const value = parseInt(star.getAttribute('data-value'));
                if (value <= count) {
                    star.classList.remove('text-slate-600');
                    star.classList.add('text-amber-400');
                    star.style.fontVariationSettings = "'FILL' 1";
                } else {
                    star.classList.add('text-slate-600');
                    star.classList.remove('text-amber-400');
                    star.style.fontVariationSettings = "'FILL' 0";
                }
            });
        }

        function resetStars() {
            currentRating = 0;
            ratingInput.value = '';
            highlightStars(0);
        }
    </script>
</body>
</html>
