<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Animal Storybook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fcd34d;
            background-image: radial-gradient(#fde68a 4px, transparent 4px);
            background-size: 40px 40px;
            font-family: 'Fredoka One', cursive;
            margin: 0;
            overflow: hidden;
        }

        /* 3D Flip Animation */
        .page-flip-next {
            animation: flipNext 0.6s ease-in-out forwards;
        }
        @keyframes flipNext {
            0% { transform: perspective(1500px) rotateY(0deg); opacity: 1; }
            50% { transform: perspective(1500px) rotateY(-90deg); opacity: 0; }
            51% { transform: perspective(1500px) rotateY(90deg); opacity: 0; }
            100% { transform: perspective(1500px) rotateY(0deg); opacity: 1; }
        }

        .page-flip-prev {
            animation: flipPrev 0.6s ease-in-out forwards;
        }
        @keyframes flipPrev {
            0% { transform: perspective(1500px) rotateY(0deg); opacity: 1; }
            50% { transform: perspective(1500px) rotateY(90deg); opacity: 0; }
            51% { transform: perspective(1500px) rotateY(-90deg); opacity: 0; }
            100% { transform: perspective(1500px) rotateY(0deg); opacity: 1; }
        }

        .fact-list li {
            margin-bottom: 1rem;
            display: flex;
            align-items: start;
            text-align: left;
        }
        .fact-list li::before {
            content: "✨";
            margin-right: 0.5rem;
            flex-shrink: 0;
        }
    </style>
</head>

        // Preload all animal images for instant rendering
        window.addEventListener('load', () => {
            bookPages.forEach(page => {
                if (page.image) {
                    const img = new Image();
                    img.src = page.image;
                }
            });
        });

        let currentPage = 0;

        const leftPageEl = document.getElementById('leftPage');
        const rightPageEl = document.getElementById('rightPage');
        const titleEl = document.getElementById('pageTitle');
        const textEl = document.getElementById('pageText');
        const coverTextEl = document.getElementById('coverText');
        const emojiContainer = document.getElementById('emojiContainer');
        const pageNumLeft = document.getElementById('pageNumLeft');
        const pageNumRight = document.getElementById('pageNumRight');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const leftPointer = document.getElementById('leftPointer');
        const rightPointer = document.getElementById('rightPointer');

        function updateBook(direction) {
            const animClass = direction === 'next' ? 'page-flip-next' : 'page-flip-prev';
            
            leftPageEl.classList.add(animClass);
            rightPageEl.classList.add(animClass);

            setTimeout(() => {
                const pageData = bookPages[currentPage];
                
                titleEl.innerText = pageData.title;
                titleEl.className = `text-5xl font-black mb-6 leading-tight drop-shadow-md ${pageData.color}`;
                
                if (pageData.isCover) {
                    textEl.classList.add('hidden');
                    coverTextEl.classList.remove('hidden');
                } else {
                    coverTextEl.classList.add('hidden');
                    textEl.classList.remove('hidden');
                    // Build list
                    textEl.innerHTML = '';
                    pageData.facts.forEach(fact => {
                        const li = document.createElement('li');
                        li.innerText = fact;
                        textEl.appendChild(li);
                    });
                }
                
                if (pageData.image) {
                    emojiContainer.innerHTML = `<img src="${pageData.image}" alt="${pageData.title}" class="max-h-[80%] max-w-[80%] object-contain mix-blend-multiply drop-shadow-[0_20px_20px_rgba(0,0,0,0.25)] hover:scale-110 transition-transform duration-500 cursor-pointer" />`;
                } else {
                    emojiContainer.innerHTML = `<span>${pageData.emoji}</span>`;
                }
                
                if (!pageData.isCover) {
                    emojiContainer.innerHTML += `
                        <button class="absolute bottom-6 right-6 bg-white border-4 border-gray-900 rounded-full w-16 h-16 flex items-center justify-center text-3xl shadow-[4px_4px_0_0_rgba(17,24,39,1)] hover:translate-y-1 hover:translate-x-1 hover:shadow-none active:scale-95 transition-all cursor-pointer z-10" onclick="event.stopPropagation(); const msg = new SpeechSynthesisUtterance('${pageData.title}'); window.speechSynthesis.speak(msg);">
                            🐾
                        </button>
                    `;
                }

                emojiContainer.className = `w-full h-full flex items-center justify-center rounded-2xl border-4 border-gray-900 shadow-[8px_8px_0_0_rgba(17,24,39,1)] text-[200px] overflow-hidden relative ${pageData.bg}`;
                
                pageNumLeft.innerText = `Page ${currentPage * 2 + 1}`;
                pageNumRight.innerText = `Page ${currentPage * 2 + 2}`;

                // Update Button States
                if (currentPage === 0) {
                    prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    prevBtn.classList.remove('hover:translate-y-1', 'hover:translate-x-1', 'hover:shadow-none');
                    leftPointer.classList.add('hidden');
                } else {
                    prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    prevBtn.classList.add('hover:translate-y-1', 'hover:translate-x-1', 'hover:shadow-none');
                    leftPointer.classList.remove('hidden');
                }

                if (currentPage === bookPages.length - 1) {
                    nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    nextBtn.classList.remove('hover:translate-y-1', 'hover:translate-x-1', 'hover:shadow-none');
                    rightPointer.classList.add('hidden');
                } else {
                    nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    nextBtn.classList.add('hover:translate-y-1', 'hover:translate-x-1', 'hover:shadow-none');
                    rightPointer.classList.remove('hidden');
                }

            }, 300);

            setTimeout(() => {
                leftPageEl.classList.remove(animClass);
                rightPageEl.classList.remove(animClass);
            }, 600);
        }

        prevBtn.addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                updateBook('prev');
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentPage < bookPages.length - 1) {
                currentPage++;
                updateBook('next');
            }
        });

        leftPointer.addEventListener('click', () => prevBtn.click());
        rightPointer.addEventListener('click', () => nextBtn.click());

        // --- Animal Index Logic ---
        const indexModal = document.getElementById('indexModal');
        const indexBtn = document.getElementById('indexBtn');
        const closeIndexBtn = document.getElementById('closeIndexBtn');
        const indexGrid = document.getElementById('indexGrid');

        indexBtn.addEventListener('click', () => {
            indexModal.classList.remove('hidden');
        });

        closeIndexBtn.addEventListener('click', () => {
            indexModal.classList.add('hidden');
        });

        function generateIndex() {
            indexGrid.innerHTML = '';
            bookPages.forEach((page, index) => {
                if (index === 0) return; // Skip the cover page
                
                const btn = document.createElement('button');
                btn.className = `flex flex-col items-center justify-center p-4 rounded-2xl border-4 border-gray-900 shadow-[4px_4px_0_0_rgba(17,24,39,1)] hover:translate-y-1 hover:translate-x-1 hover:shadow-none transition-all bg-white cursor-pointer group`;
                
                let mediaHtml = page.image 
                    ? `<img src="${page.image}" class="h-20 object-contain mix-blend-multiply group-hover:scale-110 transition-transform" />`
                    : `<div class="text-6xl group-hover:scale-110 transition-transform">${page.emoji}</div>`;
                
                btn.innerHTML = `
                    <div class="w-full aspect-square rounded-xl flex items-center justify-center mb-4 ${page.bg} border-2 border-gray-900 overflow-hidden">
                        ${mediaHtml}
                    </div>
                    <span class="font-bold text-xl text-gray-800">${page.title}</span>
                    <span class="font-bold text-md text-gray-400 mt-1">Page ${index * 2 + 1}</span>
                `;

                btn.addEventListener('click', () => {
                    currentPage = index;
                    updateBook('next');
                    indexModal.classList.add('hidden');
                });
                
                indexGrid.appendChild(btn);
            });
        }

        // Initialize the index grid
        generateIndex();

    </script>
</body>
</html>
