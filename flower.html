<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow a Flower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #bae6fd; /* Sky blue background */
            cursor: default;
        }
        
        .neubrutalism {
            border: 4px solid #111827;
            box-shadow: 8px 8px 0px 0px #111827;
        }

        .neubrutalism-heavy {
            border: 8px solid #111827;
            box-shadow: 12px 12px 0px 0px #111827;
        }

        .slot {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s;
            box-shadow: inset 0 8px 0 0 rgba(0,0,0,0.1), 4px 4px 0 0 #111827;
        }
        
        .slot:hover, .slot.active-tool {
            transform: translateY(-8px);
            box-shadow: inset 0 8px 0 0 rgba(0,0,0,0.1), 8px 12px 0 0 #111827;
        }

        .slot:hover {
            background-color: #fef08a;
        }
        
        .slot.active-tool {
            background-color: #93c5fd; /* Blue highlight for active */
        }

        .tool-icon {
            width: 70px;
            height: 70px;
            object-fit: contain;
            pointer-events: none;
            /* Drop shadow to make it pop without a background */
            filter: drop-shadow(4px 4px 0px rgba(17,24,39,1));
        }

        .dirt-texture {
            background-color: #8B4513;
            background-image: radial-gradient(#5C2E0B 4px, transparent 4px);
            background-size: 40px 40px;
        }

        /* Water Drop Animation */
        .water-drop {
            position: fixed;
            width: 8px;
            height: 16px;
            background-color: #3b82f6; /* bright blue */
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            pointer-events: none;
            z-index: 9998;
            border: 2px solid #1e3a8a;
            animation: fall 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(80px) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body class="flex w-screen h-screen p-8 gap-8 items-center justify-center cursor-default">

    <!-- Top Left Nav -->
    <div class="absolute top-6 left-6 z-50 flex gap-4 items-start">
        <a href="index.html" class="inline-flex items-center gap-2 bg-white text-gray-900 px-6 py-3 rounded-2xl neubrutalism hover:-translate-y-1 hover:-translate-x-1 hover:shadow-[4px_4px_0_0_rgba(17,24,39,1)] transition-all font-bold text-xl uppercase tracking-widest">
            <span class="text-2xl">🏠</span> Back
        </a>
    </div>

    <!-- Left Side: Garden Bed (60%) -->
    <div class="w-[60%] h-[95%] flex flex-col items-center justify-start pt-8 relative gap-6">
        
        <!-- Wooden Garden Bed Box -->
        <div class="w-[90%] h-[75%] bg-[#d97706] rounded-[40px] neubrutalism-heavy p-8 relative flex flex-col justify-end">
            
            <!-- Wood Grain Lines Decor -->
            <div class="absolute top-8 left-10 w-2/3 h-2 bg-amber-900/30 rounded-full"></div>
            <div class="absolute top-16 left-20 w-1/2 h-2 bg-amber-900/30 rounded-full"></div>
            <div class="absolute bottom-8 right-10 w-3/4 h-2 bg-amber-900/30 rounded-full"></div>
            
            <!-- Inner Dirt Field (Interactive Area) -->
            <div id="garden-bed" class="w-full flex-1 dirt-texture border-8 border-gray-900 rounded-3xl relative overflow-hidden flex flex-col mt-6 p-6">
                <!-- Decorative specks in dirt -->
                <div class="absolute top-10 left-10 w-12 h-6 bg-gray-600 rounded-full border-4 border-gray-900 shadow-inner z-0 opacity-50 pointer-events-none"></div>
                <div class="absolute bottom-10 right-10 w-16 h-8 bg-gray-500 rounded-full border-4 border-gray-900 shadow-inner z-0 opacity-50 pointer-events-none"></div>
                
                <!-- Grid of 16 Small Planting Holes -->
                <div id="holes-grid" class="w-full h-full grid grid-cols-4 grid-rows-4 gap-4 items-center justify-items-center relative z-10">
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                    <div class="planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center" data-state="empty"></div>
                </div>
            </div>
            
            <!-- Front lip of the box -->
            <div class="w-[104%] h-12 bg-[#b45309] border-8 border-gray-900 rounded-xl absolute -bottom-8 -left-[2%] z-20 shadow-[0_10px_20px_rgba(0,0,0,0.3)]"></div>
        </div>

        <!-- Pots Row Underneath Garden Bed -->
        <div class="w-[90%] h-[20%] flex items-end justify-around px-8 mt-2">
            <div class="display-pot relative cursor-pointer hover:-translate-y-2 transition-transform drop-shadow-[8px_8px_0_rgba(17,24,39,0.2)]">
                <img src="https://aold-relic.github.io/WoodleDoo/images/home/tool_pot.png" class="w-32 h-32 object-contain filter drop-shadow-[4px_4px_0_rgba(17,24,39,1)]" alt="Pot" onload="this.src = transparentImages['tool-pot'] || this.src;">
                <!-- Placeholder for flower -->
                <div class="pot-flower absolute -top-8 left-1/2 -translate-x-1/2 text-6xl pointer-events-none"></div>
            </div>
            <div class="display-pot relative cursor-pointer hover:-translate-y-2 transition-transform drop-shadow-[8px_8px_0_rgba(17,24,39,0.2)]">
                <img src="https://aold-relic.github.io/WoodleDoo/images/home/tool_pot.png" class="w-32 h-32 object-contain filter drop-shadow-[4px_4px_0_rgba(17,24,39,1)]" alt="Pot" onload="this.src = transparentImages['tool-pot'] || this.src;">
                <div class="pot-flower absolute -top-8 left-1/2 -translate-x-1/2 text-6xl pointer-events-none"></div>
            </div>
            <div class="display-pot relative cursor-pointer hover:-translate-y-2 transition-transform drop-shadow-[8px_8px_0_rgba(17,24,39,0.2)]">
                <img src="https://aold-relic.github.io/WoodleDoo/images/home/tool_pot.png" class="w-32 h-32 object-contain filter drop-shadow-[4px_4px_0_rgba(17,24,39,1)]" alt="Pot" onload="this.src = transparentImages['tool-pot'] || this.src;">
                <div class="pot-flower absolute -top-8 left-1/2 -translate-x-1/2 text-6xl pointer-events-none"></div>
            </div>
            <div class="display-pot relative cursor-pointer hover:-translate-y-2 transition-transform drop-shadow-[8px_8px_0_rgba(17,24,39,0.2)]">
                <img src="https://aold-relic.github.io/WoodleDoo/images/home/tool_pot.png" class="w-32 h-32 object-contain filter drop-shadow-[4px_4px_0_rgba(17,24,39,1)]" alt="Pot" onload="this.src = transparentImages['tool-pot'] || this.src;">
                <div class="pot-flower absolute -top-8 left-1/2 -translate-x-1/2 text-6xl pointer-events-none"></div>
            </div>
        </div>

    </div>

    <!-- Right Side: Tools Shelf (40%) -->
    <div class="w-[40%] h-[90%] bg-[#b45309] rounded-[40px] neubrutalism-heavy p-8 relative flex flex-col gap-6">
        
        <!-- Shelf Header -->
        <div class="bg-amber-100 border-4 border-gray-900 rounded-2xl py-3 text-center mb-2 shadow-[inset_0_4px_0_rgba(0,0,0,0.1)] z-10">
            <h2 class="font-black text-3xl uppercase tracking-widest text-gray-900">Tool Shelf</h2>
        </div>

        <!-- Slot 1: Hand Trowel -->
        <div id="tool-trowel" class="flex-1 bg-amber-50 border-4 border-gray-900 rounded-2xl slot flex items-center justify-between px-8 cursor-pointer group z-10">
            <div class="group-hover:rotate-12 transition-transform">
                <img src="https://aold-relic.github.io/WoodleDoo/images/home/tool_trowel.png" class="tool-icon" alt="Hand Trowel">
            </div>
            <div class="font-black text-2xl uppercase tracking-wider text-gray-700 group-hover:text-gray-900">Trowel</div>
        </div>

        <!-- Slot 2: Seeds -->
        <div id="tool-seeds" class="relative flex-1 bg-amber-50 border-4 border-gray-900 rounded-2xl slot flex items-center justify-between px-8 cursor-pointer group z-20">
            <!-- Seed Selection Popup Menu -->
            <div id="seed-menu" class="absolute -left-[90px] top-1/2 -translate-y-1/2 bg-white border-4 border-gray-900 rounded-2xl shadow-[4px_4px_0_rgba(17,24,39,1)] p-3 flex-col gap-3 hidden group-hover:flex z-50">
                <button class="seed-option text-4xl hover:scale-125 transition-transform drop-shadow-md" data-seed="🌻">🌻</button>
                <button class="seed-option text-4xl hover:scale-125 transition-transform drop-shadow-md" data-seed="🌹">🌹</button>
                <button class="seed-option text-4xl hover:scale-125 transition-transform drop-shadow-md" data-seed="🌷">🌷</button>
                <button class="seed-option text-4xl hover:scale-125 transition-transform drop-shadow-md" data-seed="🌼">🌼</button>
            </div>

            <div class="group-hover:-rotate-12 transition-transform">
                <img src="https://aold-relic.github.io/WoodleDoo/images/home/tool_seeds.png" class="tool-icon" alt="Seeds Packet">
            </div>
            <div class="font-black text-2xl uppercase tracking-wider text-gray-700 group-hover:text-gray-900 flex items-center">
                Seeds <span id="current-seed-display" class="text-4xl ml-3 drop-shadow-sm">🌻</span>
            </div>
        </div>

        <!-- Slot 3: Watering Can -->
        <div id="tool-water" class="flex-1 bg-amber-50 border-4 border-gray-900 rounded-2xl slot flex items-center justify-between px-8 cursor-pointer group z-10">
            <div class="group-hover:scale-110 transition-transform">
                <img src="https://aold-relic.github.io/WoodleDoo/images/home/tool_water.png" class="tool-icon" alt="Watering Can">
            </div>
            <div class="font-black text-2xl uppercase tracking-wider text-gray-700 group-hover:text-gray-900">Water</div>
        </div>

        <!-- Slot 4: Display Pot -->
        <div id="tool-pot" class="flex-1 bg-amber-50 border-4 border-gray-900 rounded-2xl slot flex items-center justify-between px-8 cursor-pointer group z-10">
            <div class="group-hover:translate-y-2 transition-transform">
                <img src="https://aold-relic.github.io/WoodleDoo/images/home/tool_pot.png" class="tool-icon" alt="Flower Pot">
            </div>
            <div class="font-black text-2xl uppercase tracking-wider text-gray-700 group-hover:text-gray-900">Pot</div>
        </div>

        <!-- Shelf wooden dividers (visual decor) -->
        <div class="absolute left-0 w-full h-4 bg-gray-900/20 top-[28%] pointer-events-none z-0"></div>
        <div class="absolute left-0 w-full h-4 bg-gray-900/20 top-[52%] pointer-events-none z-0"></div>
        <div class="absolute left-0 w-full h-4 bg-gray-900/20 top-[76%] pointer-events-none z-0"></div>

    </div>

    <script>
        // Store transparent versions of images
        const transparentImages = {};

        // Helper to remove white background from generated images
        function makeTransparent(imageId, src) {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                // Turn white pixels transparent (tolerating slightly off-white artifacts from AI)
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    if (r > 240 && g > 240 && b > 240) {
                        data[i+3] = 0; // Alpha = 0
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                const transparentUrl = canvas.toDataURL('image/png');
                transparentImages[imageId] = transparentUrl;
                
                // Update the shelf image
                const shelfImg = document.querySelector(`#${imageId} img`);
                if(shelfImg) shelfImg.src = transparentUrl;
            };
            img.src = src;
        }

        // Process all tools
        makeTransparent('tool-trowel', 'https://aold-relic.github.io/WoodleDoo/images/home/tool_trowel.png');
        makeTransparent('tool-seeds', 'https://aold-relic.github.io/WoodleDoo/images/home/tool_seeds.png');
        makeTransparent('tool-water', 'https://aold-relic.github.io/WoodleDoo/images/home/tool_water.png');
        makeTransparent('tool-pot', 'https://aold-relic.github.io/WoodleDoo/images/home/tool_pot.png');

        const gardenBed = document.getElementById('garden-bed');
        const toolWater = document.getElementById('tool-water');
        const toolSeeds = document.getElementById('tool-seeds');
        const toolTrowel = document.getElementById('tool-trowel');
        const toolPot = document.getElementById('tool-pot');
        
        let selectedTool = null;
        let selectedSeed = '🌻';
        let pickedFlower = null;

        // Seed Selection Menu Logic
        const seedDisplay = document.getElementById('current-seed-display');
        document.querySelectorAll('.seed-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); // prevent double firing on slot click
                selectedSeed = btn.dataset.seed;
                seedDisplay.innerText = selectedSeed;
                selectTool('seeds', toolSeeds);
            });
        });

        // Tool Selection
        function selectTool(toolName, element) {
            selectedTool = toolName;
            
            // Drop any held flower when changing tools
            pickedFlower = null;
            document.body.style.cursor = 'default';

            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-tool'));
            element.classList.add('active-tool');
        }

        toolWater.addEventListener('click', () => selectTool('water', toolWater));
        toolSeeds.addEventListener('click', () => selectTool('seeds', toolSeeds));
        toolTrowel.addEventListener('click', () => selectTool('trowel', toolTrowel));
        toolPot.addEventListener('click', () => selectTool('pot', toolPot));

        // Display Pots Logic
        const displayPots = document.querySelectorAll('.display-pot');
        displayPots.forEach(pot => {
            pot.addEventListener('click', () => {
                if (pickedFlower) {
                    const flowerContainer = pot.querySelector('.pot-flower');
                    flowerContainer.innerText = pickedFlower;
                    
                    // Reset after planting
                    pickedFlower = null;
                    document.body.style.cursor = 'default';
                    selectTool(null, toolPot); // Deselect tool to avoid accidental pickups
                    toolPot.classList.remove('active-tool');
                }
            });
        });

        // Hole Interactions (Planting & Watering)
        const holes = document.querySelectorAll('.planting-hole');
        holes.forEach(hole => {
            hole.addEventListener('click', () => {
                const state = hole.dataset.state;
                
                if (selectedTool === 'seeds' && state === 'empty') {
                    // Close the hole by turning it into a dirt mound
                    hole.dataset.state = 'seeded';
                    hole.dataset.seedType = selectedSeed; // Remember what we planted
                    hole.className = 'planting-hole w-16 h-12 bg-[#8B4513] rounded-full shadow-[0_4px_6px_rgba(0,0,0,0.6)] border-2 border-[#5C2E0B] cursor-pointer transition-all relative flex items-center justify-center';
                } 
                else if (selectedTool === 'water' && state === 'seeded') {
                    // Grow a flower!
                    hole.dataset.state = 'grown';
                    const flowerToGrow = hole.dataset.seedType || '🌸'; // Fallback
                    
                    const plant = document.createElement('div');
                    plant.innerText = flowerToGrow;
                    plant.className = 'absolute -top-12 text-6xl transform scale-0 transition-transform duration-700 ease-out drop-shadow-md z-20 pointer-events-none';
                    hole.appendChild(plant);
                    
                    // Trigger animation next frame
                    requestAnimationFrame(() => {
                        plant.style.transform = 'scale(1) rotate(' + (Math.random() * 20 - 10) + 'deg)';
                    });
                }
                else if (selectedTool === 'trowel' && state === 'grown') {
                    // Dig up the flower and revert to empty hole
                    hole.dataset.state = 'empty';
                    hole.innerHTML = ''; // Remove the plant element
                    hole.className = 'planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center';
                }
                else if (selectedTool === 'pot' && state === 'grown') {
                    if (!pickedFlower) {
                        // Pick up the flower
                        const plantEl = hole.querySelector('div');
                        if(plantEl) {
                            pickedFlower = plantEl.innerText;
                            
                            // Change mouse cursor to the held flower
                            document.body.style.cursor = `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' style='font-size:36px'><text y='36'>${pickedFlower}</text></svg>") 24 24, auto`;
                            
                            // Revert hole back to empty
                            hole.dataset.state = 'empty';
                            hole.innerHTML = '';
                            hole.className = 'planting-hole w-16 h-8 bg-[#3d1a04] rounded-[100%] border-4 border-gray-900 shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] cursor-pointer hover:bg-[#2c1202] transition-all relative flex items-center justify-center';
                        }
                    }
                }
            });
        });

        // Mouse Move over Garden Bed (Watering Effect)
        let lastDropTime = 0;
        gardenBed.addEventListener('mousemove', (e) => {
            if (selectedTool !== 'water') return;

            // Generate water drops every 60ms when hovering, directly from mouse cursor
            const now = Date.now();
            if (now - lastDropTime > 60) {
                lastDropTime = now;
                createWaterDrop(e.clientX, e.clientY);
            }
        });

        function createWaterDrop(mouseX, mouseY) {
            const drop = document.createElement('div');
            drop.className = 'water-drop';
            
            // Offset drops slightly from the exact center of the cursor
            drop.style.left = (mouseX - 4 + (Math.random() * 8)) + 'px';
            drop.style.top = mouseY + 'px';

            document.body.appendChild(drop);

            // Clean up the DOM after animation finishes (500ms)
            setTimeout(() => {
                drop.remove();
            }, 500);
        }
    </script>
</body>
</html>
