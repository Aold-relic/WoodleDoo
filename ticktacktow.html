<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>

    <title>Sketchline | Tic Tac Toe</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Hanken+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <style>
        body {
            background: radial-gradient(circle at top, #4ade80 0%, #14532d 100%);
            font-family: 'Hanken Grotesk', sans-serif;
            min-height: 100vh;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'EB Garamond', serif;
        }
        
        /* Wooden Board Aesthetics */
        .wood-board {
            background: linear-gradient(135deg, #A0522D, #8B4513);
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.5),
                12px 12px 0px rgba(17,24,39,1),
                0 20px 40px rgba(0,0,0,0.3);
            border: 4px solid #5C3A21;
        }
        .wood-cell {
            background: linear-gradient(135deg, #7A3C11, #944A17);
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.6), inset -2px -2px 4px rgba(255,255,255,0.1);
            border: 2px solid #4a2f1b;
            transition: transform 0.1s;
        }
        .wood-cell:active {
            transform: scale(0.95);
        }
        .wood-cell.empty:hover {
            background: linear-gradient(135deg, #874415, #a3531b);
        }
        
        .marker {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.3));
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>

    <script>
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const currentPlayerDisplay = document.getElementById('currentPlayerDisplay');
        
        let currentPlayer = 'X';
        let gameState = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let gameMode = 'pvp'; // 'pvp' or 'pve'
        
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // Sound Engine
        function playPopSound() {
            var AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            var ctx = new AudioContext();
            var popOsc = ctx.createOscillator();
            var popGain = ctx.createGain();
            popOsc.type = 'sine';
            popOsc.frequency.setValueAtTime(800, ctx.currentTime);
            popOsc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
            popGain.gain.setValueAtTime(1, ctx.currentTime);
            popGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            popOsc.connect(popGain);
            popGain.connect(ctx.destination);
            popOsc.start();
            popOsc.stop(ctx.currentTime + 0.1);
        }
        
        function playWinChimes() {
            var AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            var ctx = new AudioContext();
            var freqs = [523.25, 659.25, 783.99, 1046.50];
            freqs.forEach((freq, index) => {
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                var startTime = ctx.currentTime + (index * 0.1);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.3, startTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 1.0);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(startTime);
                osc.stop(startTime + 1.0);
            });
        }

        function shootConfetti() {
            var rect = boardEl.getBoundingClientRect();
            ['left', 'right'].forEach(side => {
                for (let i = 0; i < 100; i++) {
                    let conf = document.createElement('div');
                    conf.textContent = ['🐒', '🐆', '🦜', '🐸', '🐅', '🐊', '🦋'][Math.floor(Math.random() * 7)];
                    conf.className = 'fixed z-[9999] pointer-events-none text-4xl';
                    if (side === 'left') {
                        conf.style.left = (rect.left) + 'px';
                        conf.style.bottom = (window.innerHeight - rect.bottom) + 'px';
                    } else {
                        conf.style.right = (window.innerWidth - rect.right) + 'px';
                        conf.style.bottom = (window.innerHeight - rect.bottom) + 'px';
                    }
                    document.body.appendChild(conf);
                    
                    let tx = (side === 'left' ? 1 : -1) * (Math.random() * 500 + 100);
                    let ty = -(Math.random() * 800 + 200);
                    let rot = Math.random() * 1080 - 540;
                    
                    conf.style.transition = 'transform 800ms cubic-bezier(0.25, 1, 0.5, 1)';
                    
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            conf.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
                        });
                    });
                    
                    setTimeout(() => {
                        conf.style.transition = 'transform 1200ms ease-in, opacity 1200ms ease-in';
                        let fallTy = window.innerHeight;
                        let fallTx = tx + ((side === 'left' ? 1 : -1) * (Math.random() * 200));
                        conf.style.transform = `translate(${fallTx}px, ${fallTy}px) rotate(${rot + 360}deg)`;
                        conf.style.opacity = '0';
                    }, 800);
                    
                    setTimeout(() => conf.remove(), 2000);
                }
            });
        }

        function setGameMode(mode) {
            gameMode = mode;
            document.getElementById('modePvP').classList.toggle('ring-4', mode === 'pvp');
            document.getElementById('modePvP').classList.toggle('ring-[#10b981]', mode === 'pvp');
            document.getElementById('modePvP').classList.toggle('ring-offset-2', mode === 'pvp');
            document.getElementById('modePvP').classList.toggle('opacity-70', mode !== 'pvp');
            
            document.getElementById('modePvE').classList.toggle('ring-4', mode === 'pve');
            document.getElementById('modePvE').classList.toggle('ring-[#10b981]', mode === 'pve');
            document.getElementById('modePvE').classList.toggle('ring-offset-2', mode === 'pve');
            document.getElementById('modePvE').classList.toggle('opacity-70', mode !== 'pve');
            
            resetBtn.click();
        }

        function makeComputerMove() {
            if (!gameActive) return;
            
            let move = -1;
            
            // 1. Try to Win (Computer is 'X')
            for (let combo of winningConditions) {
                const [a, b, c] = combo;
                if (gameState[a] === 'X' && gameState[b] === 'X' && gameState[c] === '') move = c;
                if (gameState[a] === 'X' && gameState[c] === 'X' && gameState[b] === '') move = b;
                if (gameState[b] === 'X' && gameState[c] === 'X' && gameState[a] === '') move = a;
            }
            
            // 2. Try to Block (Player is 'O')
            if (move === -1) {
                for (let combo of winningConditions) {
                    const [a, b, c] = combo;
                    if (gameState[a] === 'O' && gameState[b] === 'O' && gameState[c] === '') move = c;
                    if (gameState[a] === 'O' && gameState[c] === 'O' && gameState[b] === '') move = b;
                    if (gameState[b] === 'O' && gameState[c] === 'O' && gameState[a] === '') move = a;
                }
            }
            
            // 3. Random empty cell
            if (move === -1) {
                let emptyCells = [];
                for(let i=0; i<9; i++) {
                    if (gameState[i] === '') emptyCells.push(i);
                }
                if (emptyCells.length > 0) {
                    move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                }
            }
            
            if (move !== -1) {
                const cell = boardEl.children[move];
                // Simulate click for computer
                const clickEvent = new MouseEvent('click', { bubbles: true });
                cell.dispatchEvent(clickEvent);
            }
        }

        // Initialize Board
        function initBoard() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('wood-cell', 'empty', 'rounded-2xl', 'flex', 'items-center', 'justify-center', 'cursor-pointer');
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                boardEl.appendChild(cell);
            }
        }

        function handleCellClick(e) {
            // Prevent human from clicking during computer's turn in PvE
            if (gameMode === 'pve' && currentPlayer === 'X' && e.isTrusted) return; 

            const cell = e.target.closest('.wood-cell');
            const index = cell.dataset.index;
            
            if (gameState[index] !== '' || !gameActive) return;
            
            // Update state
            gameState[index] = currentPlayer;
            cell.classList.remove('empty');
            
            // Draw marker (Dark Wood Text)
            const markerColor = currentPlayer === 'X' ? 'text-[#2C1810]' : 'text-[#3E2313]';
            const markerSymbol = currentPlayer;
            
            cell.innerHTML = `<span class="marker text-[160px] font-black font-sans leading-none ${markerColor}" style="text-shadow: 2px 2px 0 rgba(0,0,0,0.5), inset 2px 2px 4px rgba(0,0,0,1);">${markerSymbol}</span>`;
            
            // Frog Ribbit Animation
            const jungleFrog = document.getElementById('jungle-frog');
            const frogSpeech = document.getElementById('frog-speech');
            if(jungleFrog && frogSpeech) {
                jungleFrog.style.transform = 'scaleX(-1) scaleY(1.1) translateY(-20px)';
                frogSpeech.style.opacity = '1';
                setTimeout(() => {
                    jungleFrog.style.transform = 'scaleX(-1) scaleY(1) translateY(0)';
                    frogSpeech.style.opacity = '0';
                }, 400);
            }
            
            playPopSound();
            
            checkResult();
        }

        function drawWinningLine(combo) {
            const boardRect = boardEl.getBoundingClientRect();
            const cellA = boardEl.children[combo[0]].getBoundingClientRect();
            const cellC = boardEl.children[combo[2]].getBoundingClientRect();
            
            // Center points relative to the board
            const startX = cellA.left + cellA.width/2 - boardRect.left;
            const startY = cellA.top + cellA.height/2 - boardRect.top;
            const endX = cellC.left + cellC.width/2 - boardRect.left;
            const endY = cellC.top + cellC.height/2 - boardRect.top;
            
            const length = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
            const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;
            
            const line = document.createElement('div');
            line.className = 'absolute bg-[#fde047] z-50 rounded-full shadow-[4px_4px_0_0_rgba(17,24,39,1)] border-4 border-gray-900 pointer-events-none';
            line.style.height = '24px'; 
            line.style.width = length + 'px';
            line.style.top = startY + 'px';
            line.style.left = startX + 'px';
            line.style.transformOrigin = '0 50%';
            line.style.transform = `translateY(-50%) rotate(${angle}deg) scaleX(0)`;
            line.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            line.id = 'winning-line';
            boardEl.appendChild(line);
            
            // Animate
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    line.style.transform = `translateY(-50%) rotate(${angle}deg) scaleX(1)`;
                });
            });
        }

        function checkResult() {
            let roundWon = false;
            let winningCombo = null;
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningCombo = [a, b, c];
                    break;
                }
            }
            
            if (roundWon) {
                statusEl.innerHTML = `<span class="text-[#10b981]">Player <span class="text-[#2C1810] font-black font-sans">${currentPlayer}</span> Wins! 🎉</span>`;
                gameActive = false;
                playWinChimes();
                drawWinningLine(winningCombo);
                setTimeout(shootConfetti, 200);
                return;
            }
            
            if (!gameState.includes('')) {
                statusEl.innerHTML = `It's a Draw! 🤝`;
                gameActive = false;
                return;
            }
            
            // Switch Player
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            currentPlayerDisplay.textContent = currentPlayer;
            currentPlayerDisplay.className = currentPlayer === 'X' ? 'text-[#2C1810] font-black font-sans text-4xl' : 'text-[#3E2313] font-black font-sans text-4xl';
            
            // Trigger Computer Move if PvE
            if (gameMode === 'pve' && currentPlayer === 'X' && gameActive) {
                setTimeout(makeComputerMove, 600);
            }
        }

        resetBtn.addEventListener('click', () => {
            playPopSound();
            currentPlayer = 'X';
            gameState = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            statusEl.innerHTML = `Player <span id="currentPlayerDisplay" class="text-[#2C1810] font-black font-sans text-5xl">X</span>'s Turn`;
            
            const oldLine = document.getElementById('winning-line');
            if (oldLine) oldLine.remove();
            
            initBoard();
            
            if (gameMode === 'pve') {
                setTimeout(makeComputerMove, 600);
            }
        });

        // Start
        initBoard();

        // Random Frog Blinking
        document.querySelectorAll('.frog-eye').forEach(frog => {
            function randomBlink() {
                frog.style.transform = 'scaleY(0.1)';
                setTimeout(() => {
                    frog.style.transform = 'scaleY(1)';
                    setTimeout(randomBlink, Math.random() * 5000 + 1000); 
                }, 100); 
            }
            setTimeout(randomBlink, Math.random() * 3000); 
        });

        // Interactive Draggable Monkeys
        let draggedMonkey = null;
        let startMouseX, startMouseY;
        let initialLeft, initialTop;

        function playMonkeySound() {
            var AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            var ctx = new AudioContext();
            for(let i=0; i<3; i++) {
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(600 + (Math.random()*200), ctx.currentTime + (i*0.1));
                osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + (i*0.1) + 0.1);
                gain.gain.setValueAtTime(0, ctx.currentTime + (i*0.1));
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + (i*0.1) + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i*0.1) + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime + (i*0.1));
                osc.stop(ctx.currentTime + (i*0.1) + 0.1);
            }
        }

        document.querySelectorAll('.interactive-monkey').forEach(monkey => {
            monkey.style.pointerEvents = 'auto';
            monkey.style.userSelect = 'none';
            
            monkey.addEventListener('mousedown', (e) => {
                if (monkey.dataset.animating === 'true') return;
                e.preventDefault();
                
                draggedMonkey = monkey;
                startMouseX = e.clientX;
                startMouseY = e.clientY;
                
                const rect = monkey.getBoundingClientRect();
                monkey.style.position = 'fixed';
                monkey.style.left = rect.left + 'px';
                monkey.style.top = rect.top + 'px';
                monkey.style.right = 'auto';
                monkey.style.bottom = 'auto';
                monkey.style.zIndex = '9999'; 
                
                initialLeft = rect.left;
                initialTop = rect.top;
                
                monkey.dataset.dragged = 'false';
            });
        });

        window.addEventListener('mousemove', (e) => {
            if (!draggedMonkey) return;
            
            const dx = e.clientX - startMouseX;
            const dy = e.clientY - startMouseY;
            
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                draggedMonkey.dataset.dragged = 'true';
                draggedMonkey.style.left = (initialLeft + dx) + 'px';
                draggedMonkey.style.top = (initialTop + dy) + 'px';
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (draggedMonkey) {
                if (draggedMonkey.dataset.dragged !== 'true') {
                    // It was just a click!
                    draggedMonkey.dataset.animating = 'true';
                    playMonkeySound();
                    
                    draggedMonkey.style.transform = 'rotate(360deg) scale(1.2)';
                    
                    const bubble = document.createElement('div');
                    bubble.textContent = ['Ooh ooh!', 'Aah aah!', '🍌', '🙈', '🙉', '🙊'][Math.floor(Math.random() * 6)];
                    bubble.className = 'absolute top-[-20px] left-1/2 -translate-x-1/2 bg-white rounded-full px-4 py-2 text-2xl font-black text-black shadow-[4px_4px_0_0_rgba(17,24,39,1)] border-4 border-gray-900 pointer-events-none z-50 whitespace-nowrap transform-none';
                    bubble.style.animation = 'sway 2s infinite alternate';
                    
                    draggedMonkey.appendChild(bubble);
                    
                    setTimeout(() => {
                        draggedMonkey.style.transform = 'rotate(0deg) scale(1)';
                        setTimeout(() => {
                            bubble.remove();
                            draggedMonkey.dataset.animating = 'false';
                        }, 500);
                    }, 800);
                }
                draggedMonkey = null;
            }
        });
    </script>
</body>
</html>
