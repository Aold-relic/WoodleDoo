<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sketchline | Odd One Out</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Hanken+Grotesk:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        body {
            background-color: #fcd34d;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(180, 83, 9, 0.1) 20px, rgba(180, 83, 9, 0.1) 40px),
                              repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(180, 83, 9, 0.15) 20px, rgba(180, 83, 9, 0.15) 40px);
            font-family: 'Hanken Grotesk', sans-serif;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }
        
        .card-btn {
            background-color: white;
            border: 4px solid #111827;
            border-radius: 16px;
            box-shadow: 4px 4px 0px 0px rgba(17,24,39,1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            width: 80px;
            height: 80px;
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .card-btn:hover {
            transform: translateY(-4px);
            box-shadow: 6px 8px 0px 0px rgba(17,24,39,1);
        }
        .card-btn:active {
            transform: scale(0.9) translateY(4px) translateX(4px);
            box-shadow: 0px 0px 0px 0px rgba(17,24,39,1);
        }
        
        .card-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none !important;
            box-shadow: 4px 4px 0px 0px rgba(17,24,39,1) !important;
        }

        .status-box {
            background-color: white;
            border: 4px solid #111827;
            border-radius: 12px;
            box-shadow: 4px 4px 0px 0px rgba(17,24,39,1);
            font-size: 1.5rem;
            font-weight: 900;
            width: 120px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .row-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        @keyframes slideIn {
            0% { transform: translateX(-50px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .correct-bg {
            background-color: #4ade80 !important; /* Green */
        }
        .wrong-bg {
            background-color: #f87171 !important; /* Red */
        }
    </style>
</head>
<body class="flex flex-col items-center pt-24 pb-12 relative min-h-screen">
    
    <!-- Top Nav -->
    <div class="fixed top-8 left-8 z-50 flex gap-4 w-[calc(100%-4rem)] justify-between pointer-events-none">
        <a href="index.html" class="pointer-events-auto inline-flex items-center gap-2 font-bold text-gray-900 hover:text-white transition-colors uppercase tracking-widest text-sm border-4 border-gray-900 hover:bg-gray-900 bg-white px-6 py-3 rounded-2xl shadow-[4px_4px_0_0_rgba(17,24,39,1)] hover:shadow-none hover:translate-y-1 hover:translate-x-1">
            &larr; Back to Studio
        </a>
        <div class="flex gap-4 pointer-events-auto pr-8">
            <button id="resetBtn" class="inline-flex items-center gap-2 font-bold text-white uppercase tracking-widest text-sm border-4 border-gray-900 hover:bg-red-600 bg-red-500 px-6 py-2 rounded-2xl shadow-[4px_4px_0_0_rgba(17,24,39,1)] hover:shadow-none hover:translate-y-1 hover:translate-x-1">
                Reset
            </button>
        </div>
    </div>
    
    <!-- Bottom Scoreboard -->
    <div class="fixed bottom-8 right-8 z-50 bg-white border-4 border-gray-900 rounded-3xl p-6 flex flex-col gap-2 shadow-[8px_8px_0_0_rgba(17,24,39,1)] text-xl font-bold uppercase tracking-widest text-gray-900">
        <div class="flex items-center gap-4 justify-between">
            <span class="text-green-500">✅ Correct:</span>
            <span id="correctScore" class="text-3xl font-black">0</span>
        </div>
        <div class="flex items-center gap-4 justify-between">
            <span class="text-red-500">❌ Incorrect:</span>
            <span id="incorrectScore" class="text-3xl font-black">0</span>
        </div>
    </div>

    <!-- Title Area -->
    <div class="mb-10 text-center z-10">
        <h1 class="text-6xl font-black uppercase tracking-widest text-white drop-shadow-[4px_4px_0_rgba(17,24,39,1)] mb-2 bg-[#f97316] inline-block px-8 py-2 border-4 border-gray-900 rounded-2xl shadow-[6px_6px_0_rgba(17,24,39,1)]">Odd One Out</h1>
        <p class="text-xl font-bold bg-white text-gray-900 block px-6 py-2 rounded-full border-4 border-gray-900 shadow-[4px_4px_0_0_rgba(17,24,39,1)] mt-4">Find the fruit that doesn't belong in each row!</p>
    </div>

    <!-- Game Board -->
    <div id="gameBoard" class="flex flex-col z-10">
        <!-- Rows injected by JS -->
    </div>
    
    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playTone(freq, type = 'square', duration = 0.2, volume = 0.1) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playBuzz() {
            playTone(100, 'sawtooth', 0.5, 0.55); // Buzz
        }

        function playMarioCoin() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'square';
            const t = audioCtx.currentTime;
            
            // B5 to E6 arpeggio
            osc.frequency.setValueAtTime(987.77, t); // B5
            osc.frequency.setValueAtTime(1318.51, t + 0.1); // E6
            
            gainNode.gain.setValueAtTime(0.25, t); 
            gainNode.gain.setValueAtTime(0.25, t + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start(t);
            osc.stop(t + 0.4);
        }

        function playRoundComplete() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            const t = audioCtx.currentTime;
            const noteLen = 0.12;
            
            osc.frequency.setValueAtTime(1318.51, t); // E6
            osc.frequency.setValueAtTime(1567.98, t + noteLen); // G6
            osc.frequency.setValueAtTime(2637.02, t + noteLen * 2); // E7
            osc.frequency.setValueAtTime(2093.00, t + noteLen * 3); // C7
            osc.frequency.setValueAtTime(2349.32, t + noteLen * 4); // D7
            osc.frequency.setValueAtTime(3135.96, t + noteLen * 5); // G7
            
            gainNode.gain.setValueAtTime(0.3, t);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + noteLen * 7);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start(t);
            osc.stop(t + noteLen * 7);
        }

        // Expanded Fruit Sets (10 Unique pairs with SIMILAR colors for a better challenge!)
        const fruitSets = [
            { normal: '🍎', odd: '🍅' }, // Red
            { normal: '🍌', odd: '🍋' }, // Yellow
            { normal: '🍏', odd: '🍐' }, // Green
            { normal: '🍊', odd: '🍑' }, // Orange
            { normal: '🍇', odd: '🫐' }, // Purple
            { normal: '🍒', odd: '🍓' }, // Red Berries
            { normal: '🥑', odd: '🥒' }, // Dark Green
            { normal: '🍍', odd: '🌽' }, // Yellow / Texture
            { normal: '🥥', odd: '🥔' }, // Brown / White
            { normal: '🍈', odd: '🥝' }  // Green / Round
        ];

        let totalCorrect = 0;
        let totalIncorrect = 0;
        let rowsCompleted = 0;
        let roundMistakes = 0;
        let totalRowsInRound = 4;
        const gameBoard = document.getElementById('gameBoard');
        const correctDisplay = document.getElementById('correctScore');
        const incorrectDisplay = document.getElementById('incorrectScore');
        const resetBtn = document.getElementById('resetBtn');

        // Helper to shuffle an array (Fisher-Yates)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Keep 4 rows and 5 columns always!
        const NUM_ROWS = 4;
        const NUM_COLS = 5;
        
        let activeSetIndices = new Array(NUM_ROWS).fill(null);

        function buildRow(rowIndex, rowDivContainer) {
            rowDivContainer.innerHTML = ''; // Clear contents of this row
            
            // Pick a random fruit set for this row that isn't already active
            let availableIndices = [];
            for (let i = 0; i < fruitSets.length; i++) {
                // Allow the fruit set to be picked if it's not currently active on ANY row
                // This ensures no two rows have the same fruit set at the same time
                if (!activeSetIndices.includes(i) || activeSetIndices[rowIndex] === i) {
                    // Exclude the one it just had if they got it wrong (so it always changes)
                    if (activeSetIndices[rowIndex] !== i) {
                        availableIndices.push(i);
                    }
                }
            }
            
            const randomPick = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            activeSetIndices[rowIndex] = randomPick;
            
            const set = fruitSets[randomPick];
            const oddIndex = Math.floor(Math.random() * NUM_COLS);

            // Create Status Box
            const statusBox = document.createElement('div');
            statusBox.className = 'status-box text-gray-900';
            statusBox.innerHTML = `<span>${rowIndex + 1}.</span> <span class="status-icon opacity-50">⬜</span>`;
            rowDivContainer.appendChild(statusBox);

            // Create Fruit Buttons
            for (let c = 0; c < NUM_COLS; c++) {
                const btn = document.createElement('button');
                btn.className = 'card-btn';
                
                const isOdd = (c === oddIndex);
                btn.innerText = isOdd ? set.odd : set.normal;
                
                btn.onclick = () => handleCardClick(btn, rowDivContainer, statusBox, isOdd, rowIndex);
                rowDivContainer.appendChild(btn);
            }
        }

        function buildBoard() {
            gameBoard.innerHTML = ''; // Clear previous board
            rowsCompleted = 0;
            roundMistakes = 0;
            totalRowsInRound = NUM_ROWS;

            for (let r = 0; r < NUM_ROWS; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row-container';
                rowDiv.style.animationDelay = `${r * 0.1}s`; // Staggered entrance
                
                buildRow(r, rowDiv);
                
                gameBoard.appendChild(rowDiv);
            }
        }


        function handleCardClick(clickedBtn, rowDiv, statusBox, isOdd, rowIndex) {
            // Disable all buttons in this row temporarily
            const buttons = rowDiv.querySelectorAll('.card-btn');
            buttons.forEach(b => b.disabled = true);

            const iconSpan = statusBox.querySelector('.status-icon');
            iconSpan.classList.remove('opacity-50');

            if (isOdd) {
                // Correct!
                playMarioCoin();
                totalCorrect++;
                correctDisplay.innerText = totalCorrect;
                iconSpan.innerText = '✅';
                statusBox.classList.add('correct-bg');
                statusBox.classList.remove('text-gray-900');
                statusBox.classList.add('text-white');
                
                rowsCompleted++;

                // Check if round is over
                if (rowsCompleted >= totalRowsInRound) {
                    if (roundMistakes === 0) {
                        // Perfect round! Confetti!
                        confetti({
                            particleCount: 150,
                            spread: 80,
                            origin: { y: 0.6 },
                            colors: ['#ef4444', '#f97316', '#fcd34d', '#4ade80', '#3b82f6']
                        });
                    }
                    setTimeout(() => {
                        playRoundComplete();
                        buildBoard();
                    }, 1000);
                }
            } else {
                // Wrong!
                playBuzz();
                totalIncorrect++;
                incorrectDisplay.innerText = totalIncorrect;
                roundMistakes++;
                
                iconSpan.innerText = '❌';
                statusBox.classList.add('wrong-bg');
                statusBox.classList.remove('text-gray-900');
                statusBox.classList.add('text-white');
                
                // Regenerate just this row!
                setTimeout(() => {
                    buildRow(rowIndex, rowDiv);
                }, 800);
            }
        }

        function resetGame() {
            totalCorrect = 0;
            totalIncorrect = 0;
            correctDisplay.innerText = totalCorrect;
            incorrectDisplay.innerText = totalIncorrect;
            buildBoard();
        }

        resetBtn.addEventListener('click', resetGame);

        // Start first game
        buildBoard();
    </script>
</body>
</html>
