<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | WoodleDoo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(244, 63, 94, 0.15), transparent 25%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-center p-6 text-slate-100 relative">

    <a href="index.html" class="absolute top-8 left-8 flex items-center gap-2 text-slate-400 hover:text-white transition-colors font-medium">
        <span class="material-symbols-outlined text-xl">arrow_back</span> Return to Studio
    </a>

    <div class="glass-card rounded-[2rem] p-12 flex flex-col items-center text-center max-w-md w-full animate-[fadeIn_0.6s_ease-out]">
        <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-2xl shadow-[0_0_20px_rgba(59,130,246,0.2)] mb-6">
            <span class="material-symbols-outlined text-blue-400 text-4xl">account_circle</span>
        </div>
        
        <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
        <p class="text-slate-400 mb-10">Sign in with your Google account to continue to WoodleDoo.</p>

        <!-- Google Sign-In Container -->
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        
        <div class="g_id_signin mb-4"
             data-type="standard"
             data-shape="rectangular"
             data-theme="filled_black"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>

        <!-- Authenticated User Profile (Hidden by default) -->
        <div id="userProfile" class="hidden flex-col items-center gap-4 w-full">
            <img id="userPicture" src="" alt="Profile" class="w-20 h-20 rounded-full border-4 border-slate-700 shadow-lg">
            <div>
                <p class="text-sm text-slate-400 font-bold uppercase tracking-widest">Signed in as</p>
                <h2 id="userName" class="text-2xl font-bold text-white mt-1"></h2>
            </div>
            
            <button onclick="handleSignOut()" class="mt-4 bg-slate-800 hover:bg-red-500/20 hover:text-red-400 border border-slate-700 hover:border-red-500/30 text-slate-300 px-6 py-2 rounded-xl transition-all duration-300 font-medium w-full">
                Sign Out
            </button>
        </div>

    </div>

    <script>
        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            
            // Hide the sign-in button
            document.querySelector('.g_id_signin').classList.add('hidden');
            
            // Show the user profile
            const profileDiv = document.getElementById('userProfile');
            profileDiv.classList.remove('hidden');
            profileDiv.classList.add('flex');
            
            // Populate user data
            document.getElementById('userName').innerText = responsePayload.given_name;
            document.getElementById('userPicture').src = responsePayload.picture;
            
            // Save state to localStorage
            localStorage.setItem('woodledoo_user', JSON.stringify({
                name: responsePayload.given_name,
                picture: responsePayload.picture
            }));
        }

        function handleSignOut() {
            localStorage.removeItem('woodledoo_user');
            
            // Show sign-in button
            document.querySelector('.g_id_signin').classList.remove('hidden');
            
            // Hide profile
            const profileDiv = document.getElementById('userProfile');
            profileDiv.classList.add('hidden');
            profileDiv.classList.remove('flex');
        }

        window.onload = function() {
            const savedUser = localStorage.getItem('woodledoo_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.querySelector('.g_id_signin').classList.add('hidden');
                const profileDiv = document.getElementById('userProfile');
                profileDiv.classList.remove('hidden');
                profileDiv.classList.add('flex');
                document.getElementById('userName').innerText = user.name;
                document.getElementById('userPicture').src = user.picture;
            }
        };
    </script>
</body>
</html>
