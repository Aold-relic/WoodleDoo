<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
      apiKey: "AIzaSyC9PwmfDi8BxFXi6Rb_n5_H_x83iIXJeP8",
      authDomain: "woodledoo-auth.firebaseapp.com",
      projectId: "woodledoo-auth",
      storageBucket: "woodledoo-auth.firebasestorage.app",
      messagingSenderId: "551323879293",
      appId: "1:551323879293:web:6477f4310262a27238ee14",
      measurementId: "G-VLJ5EVD50B"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  window.firebaseAuthInstance = auth;

  onAuthStateChanged(auth, (user) => {
    const nameDisplay = document.getElementById('userNameDisplay');
    const pfpDisplay = document.getElementById('userHeaderPicture');
    const accountIcon = document.getElementById('accountBtn');
    const basketStatus = document.getElementById('basketStatus');

    if (user) {
      if(nameDisplay) { nameDisplay.innerText = `Hi, ${user.displayName}!`; nameDisplay.classList.remove('hidden'); }
      if(pfpDisplay) { pfpDisplay.src = user.photoURL; pfpDisplay.classList.remove('hidden'); }
      if(accountIcon) accountIcon.classList.add('text-green-500');
      if(basketStatus) basketStatus.textContent = "Ready to drop your files!";
    } else {
      if(nameDisplay) nameDisplay.classList.add('hidden');
      if(pfpDisplay) pfpDisplay.classList.add('hidden');
      if(accountIcon) accountIcon.classList.remove('text-green-500');
      if(basketStatus) basketStatus.textContent = "Requires Google Sign-in";
    }
  });
</script>

<!-- UI Layout Engine and Drag Drop Handler Operations -->
<script>
  (function initApplicationScripts() {
    var startBtn = document.getElementById('kidsStartBtn');
    var setupDialog = document.getElementById('kidsSetupDialog');
    var cancelBtn = document.getElementById('kidsSetupCancel');
    var confirmBtn = document.getElementById('kidsSetupConfirm');
    var canvasStudio = document.getElementById('kidsCanvasStudio');
    var canvasClose = document.getElementById('kidsCanvasClose');
    var canvasTitleDisplay = document.getElementById('kidsCanvasTitleDisplay');
    var isolatedCanvas = document.getElementById('kidsIsolatedCanvas');
    var toolBtns = document.querySelectorAll('.kids-tool-btn');
    var widthSlider = document.getElementById('widthSlider');
    
    var ctx = isolatedCanvas.getContext('2d');
    var isDrawing = false;
    var lastX = 0, lastY = 0;
    var currentMode = 'pen';

    if(startBtn) startBtn.addEventListener('click', () => { setupDialog.classList.remove('opacity-0', 'pointer-events-none'); setupDialog.classList.add('opacity-100'); });
    if(cancelBtn) cancelBtn.addEventListener('click', () => { setupDialog.classList.remove('opacity-100'); setupDialog.classList.add('opacity-0', 'pointer-events-none'); });
    
    if(confirmBtn) {
      confirmBtn.addEventListener('click', function() {
        setupDialog.classList.remove('opacity-100'); setupDialog.classList.add('opacity-0', 'pointer-events-none');
        canvasStudio.classList.remove('opacity-0', 'pointer-events-none'); canvasStudio.classList.add('opacity-100');
        
        var frame = document.getElementById('canvasFrame');
        var rect = frame.getBoundingClientRect();
        isolatedCanvas.width = rect.width - 24;
        isolatedCanvas.height = rect.height - 24;
        
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, isolatedCanvas.width, isolatedCanvas.height);
        canvasTitleDisplay.textContent = document.getElementById('kidsSetupTitle').value || 'My Painting';
      });
    }

    if(canvasClose) canvasClose.addEventListener('click', () => { canvasStudio.classList.remove('opacity-100'); canvasStudio.classList.add('opacity-0', 'pointer-events-none'); });

    toolBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        currentMode = btn.getAttribute('data-tool');
        toolBtns.forEach(b => b.classList.remove('ring-4', 'ring-gray-900'));
        btn.classList.add('ring-4', 'ring-gray-900');
      });
    });

    function getPos(e) {
      var rect = isolatedCanvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (isolatedCanvas.width / rect.width),
        y: (e.clientY - rect.top) * (isolatedCanvas.height / rect.height)
      };
    }

    isolatedCanvas.addEventListener('mousedown', (e) => { isDrawing = true; var pos = getPos(e); lastX = pos.x; lastY = pos.y; ctx.beginPath(); ctx.moveTo(lastX, lastY); });
    isolatedCanvas.addEventListener('mousemove', (e) => {
      if(!isDrawing) return;
      var pos = getPos(e);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.lineWidth = widthSlider.value * (currentMode === 'eraser' ? 2.5 : 0.5);
      ctx.strokeStyle = currentMode === 'eraser' ? '#FFFFFF' : '#111827';
      if(currentMode === 'rainbow') ctx.strokeStyle = `hsl(${Date.now() % 360}, 100%, 50%)`;
      ctx.lineTo(pos.x, pos.y); ctx.stroke();
      lastX = pos.x; lastY = pos.y;
    });
    window.addEventListener('mouseup', () => { if(isDrawing) { isDrawing = false; ctx.closePath(); } });

    // Local Native Directory Picker Creation Strategy Block
    var saveBtn = document.getElementById('kidsCanvasSaveBtn');
    if(saveBtn) {
      saveBtn.addEventListener('click', async function() {
        try {
          const rootDirectoryHandle = await window.showDirectoryPicker();
          const woodledooFolder = await rootDirectoryHandle.getDirectoryHandle('woodle doo', { create: true });
          const imageBlob = await new Promise(resolve => isolatedCanvas.toBlob(resolve, 'image/png'));
          
          const titleStr = canvasTitleDisplay.textContent;
          const dataURL = isolatedCanvas.toDataURL('image/png');
          const drawId = Date.now().toString();
          const filename = 'canvas-' + drawId + '.png';
          
          const fileHandle = await woodledooFolder.getFileHandle(filename, { create: true });
          const stream = await fileHandle.createWritable();
          await stream.write(imageBlob);
          await stream.close();

          // Render newly generated asset inside local site gallery view state grid
          var grid = document.getElementById('savedPagesGrid');
          if(grid) {
            var newCard = document.createElement('div');
            newCard.id = 'saved-card-' + drawId; 
            newCard.className = 'min-w-[140px] h-[140px] bg-white border-4 border-gray-900 rounded-2xl shadow-[4px_4px_0_0_rgba(17,24,39,1)] flex flex-col overflow-hidden relative cursor-grab active:cursor-grabbing group';
            newCard.innerHTML = `
              <div class="flex-1 bg-white bg-contain bg-center bg-no-repeat relative" style="background-image: url('${dataURL}')"></div>
              <div class="bg-gray-700 border-t-4 border-gray-900 text-white text-[10px] font-bold p-2 text-center truncate">${titleStr}</div>
            `;
            
            // Set element up to interact inside drag and drop engines
            newCard.setAttribute('draggable', 'true');
            newCard.addEventListener('dragstart', function(evt) {
              evt.dataTransfer.setData('text/plain', dataURL);
              evt.dataTransfer.setData('image-title', titleStr);
            });
            
            grid.appendChild(newCard);
          }

          var originalContent = saveBtn.innerHTML;
          saveBtn.innerHTML = '<span>✅ File Created & Saved!</span>';
          setTimeout(() => { saveBtn.innerHTML = originalContent; canvasStudio.classList.add('opacity-0', 'pointer-events-none'); }, 1200);
        } catch (error) {
          alert("Save target cancelled or denied.");
        }
      });
    }

    // Basket Target Listener Pipeline Engine Blocks
    const basket = document.getElementById('cloudBasket');
    const statusText = document.getElementById('basketStatus');

    if(basket) {
      basket.addEventListener('dragover', (e) => { e.preventDefault(); basket.classList.replace('bg-blue-50/50', 'bg-blue-100'); });
      basket.addEventListener('dragleave', () => { basket.classList.replace('bg-blue-100', 'bg-blue-50/50'); });
      
      basket.addEventListener('drop', async function(e) {
        e.preventDefault();
        basket.classList.replace('bg-blue-100', 'bg-blue-50/50');

        const dataURL = e.dataTransfer.getData('text/plain');
        const drawingTitle = e.dataTransfer.getData('image-title') || 'Painting';

        if (!dataURL) return;

        const auth = window.firebaseAuthInstance;
        if (!auth || !auth.currentUser) {
          statusText.textContent = "❌ Log in with Google first!";
          return;
        }

        statusText.textContent = "⏳ Uploading to your Google Drive folder...";
        
        try {
          const res = await fetch(dataURL);
          const blob = await res.blob();
          const token = await auth.currentUser.getIdToken();

          const metadata = { name: `${drawingTitle}-${Date.now()}.png`, mimeType: 'image/png' };
          const form = new FormData();
          form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
          form.append('file', blob);

          const uploadResponse = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: form
          });

          if (!uploadResponse.ok) throw new Error();
          statusText.textContent = "✅ Dropped into your Google Drive safely!";
        } catch (err) {
          statusText.textContent = "⚠️ Cloud denied permissions. Triggering local backup download...";
          const a = document.createElement('a');
          a.href = dataURL;
          a.download = `${drawingTitle}.png`;
          a.click();
        }
      });
    }
  })();
</script>
