<!-- Firebase Modular Script Ecosystem Configuration Integration Block -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getStorage, ref, uploadString, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
      apiKey: "AIzaSyC9PwmfDi8BxFXi6Rb_n5_H_x83iIXJeP8",
      authDomain: "woodledoo-auth.firebaseapp.com",
      projectId: "woodledoo-auth",
      storageBucket: "woodledoo-auth.firebasestorage.app",
      messagingSenderId: "551323879293",
      appId: "1:551323879293:web:6477f4310262a27238ee14",
      measurementId: "G-VLJ5EVD50B"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const storage = getStorage(app);
  
  let currentUser = null;

  // Track the logged in user state automatically across pages
  onAuthStateChanged(auth, (user) => {
    const userNameDisplay = document.getElementById('userNameDisplay');
    const userHeaderPicture = document.getElementById('userHeaderPicture');
    const accountBtn = document.getElementById('accountBtn');
    const heroCanvasTitle = document.getElementById('heroCanvasTitle');

    if (user) {
      currentUser = user;
      if(userNameDisplay) { userNameDisplay.innerText = `Hi, ${user.displayName}!`; userNameDisplay.classList.remove('hidden'); }
      if(userHeaderPicture) { userHeaderPicture.src = user.photoURL; userHeaderPicture.classList.remove('hidden'); }
      if(accountBtn) accountBtn.classList.add('text-green-500');
      if(heroCanvasTitle) heroCanvasTitle.textContent = "Synced Dashboard Online";
      
      // Load user cloud canvas list images
      loadUserCloudGallery();
    } else {
      currentUser = null;
      if(userNameDisplay) userNameDisplay.classList.add('hidden');
      if(userHeaderPicture) userHeaderPicture.classList.add('hidden');
      if(accountBtn) accountBtn.classList.remove('text-green-500');
    }
  });

  // Load sketches saved inside Firebase Storage for this account profile
  async function loadUserCloudGallery() {
    if (!currentUser) return;
    const grid = document.getElementById('savedPagesGrid');
    if (!grid) return;
    grid.innerHTML = '';

    const listRef = ref(storage, `users/${currentUser.uid}/`);
    try {
      const res = await listAll(listRef);
      res.items.forEach(async (itemRef) => {
        const url = await getDownloadURL(itemRef);
        const card = document.createElement('div');
        card.className = 'min-w-[140px] h-[140px] bg-white border-4 border-gray-900 rounded-2xl flex flex-col overflow-hidden shadow-[4px_4px_0_0_rgba(17,24,39,1)]';
        card.innerHTML = `
          <div class="flex-1 bg-white bg-contain bg-center bg-no-repeat" style="background-image: url('${url}')"></div>
          <div class="bg-gray-700 border-t-4 border-gray-900 text-white text-[10px] font-bold p-1 text-center truncate">Cloud Save</div>
        `;
        grid.appendChild(card);
      });
    } catch (err) {
      console.error("Error downloading cloud image lists: ", err);
    }
  }

  // Hook save processing button directly up into Cloud Storage Engine API pipes
  const cloudSaveBtn = document.getElementById('kidsCanvasSaveBtn');
  const isolatedCanvas = document.getElementById('kidsIsolatedCanvas');

  if(cloudSaveBtn) {
    cloudSaveBtn.addEventListener('click', async function() {
      if(!currentUser) {
        alert("Please sign in with your Google account first to enable saving options!");
        return;
      }

      var originalContent = cloudSaveBtn.innerHTML;
      cloudSaveBtn.innerHTML = '<span>Uploading...</span>';
      cloudSaveBtn.disabled = true;

      try {
        // Capture canvas base64 image data string output
        const dataURL = isolatedCanvas.toDataURL('image/png');
        
        // Define clean cloud unique filename directory reference target 
        const storageRef = ref(storage, `users/${currentUser.uid}/canvas-${Date.now()}.png`);
        
        // Upload file securely inside the cloud database bucket structure string pipeline
        await uploadString(storageRef, dataURL, 'data_url');

        // Reset visual state indicators on complete resolution pipelines successfully
        cloudSaveBtn.innerHTML = '<span>☁️ Saved to Cloud!</span>';
        setTimeout(() => {
          cloudSaveBtn.innerHTML = originalContent;
          cloudSaveBtn.disabled = false;
          document.getElementById('kidsCanvasStudio').classList.add('opacity-0', 'pointer-events-none');
          loadUserCloudGallery();
        }, 1200);

      } catch (error) {
        console.error("Cloud storage operational failure pipeline:", error);
        alert("Upload rejected: " + error.message);
        cloudSaveBtn.innerHTML = originalContent;
        cloudSaveBtn.disabled = false;
      }
    });
  }
</script>

<!-- Interface Engine Operations Layout Interactions -->
<script>
  (function initLayoutGears() {
    var startBtn = document.getElementById('kidsStartBtn');
    var setupDialog = document.getElementById('kidsSetupDialog');
    var cancelBtn = document.getElementById('kidsSetupCancel');
    var confirmBtn = document.getElementById('kidsSetupConfirm');
    var canvasStudio = document.getElementById('kidsCanvasStudio');
    var canvasClose = document.getElementById('kidsCanvasClose');
    var canvasTitleDisplay = document.getElementById('kidsCanvasTitleDisplay');
    var isolatedCanvas = document.getElementById('kidsIsolatedCanvas');
    var toolBtns = document.querySelectorAll('.kids-tool-btn');
    var widthSlider = document.getElementById('widthSlider');
    
    var ctx = isolatedCanvas.getContext('2d');
    var isDrawing = false;
    var lastX = 0, lastY = 0;
    var currentMode = 'pen';

    if(startBtn) startBtn.addEventListener('click', () => setupDialog.classList.replace('opacity-0', 'opacity-100'), setupDialog.classList.remove('pointer-events-none'));
    if(cancelBtn) cancelBtn.addEventListener('click', () => setupDialog.classList.replace('opacity-100', 'opacity-0'), setupDialog.classList.add('pointer-events-none'));
    
    if(confirmBtn) {
      confirmBtn.addEventListener('click', function() {
        setupDialog.classList.replace('opacity-100', 'opacity-0');
        setupDialog.classList.add('pointer-events-none');
        canvasStudio.classList.replace('opacity-0', 'opacity-100');
        canvasStudio.classList.remove('pointer-events-none');
        
        var frame = document.getElementById('canvasFrame');
        var rect = frame.getBoundingClientRect();
        isolatedCanvas.width = rect.width - 24;
        isolatedCanvas.height = rect.height - 24;
        
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, isolatedCanvas.width, isolatedCanvas.height);
        canvasTitleDisplay.textContent = document.getElementById('kidsSetupTitle').value || 'My Cloud Painting';
      });
    }

    if(canvasClose) canvasClose.addEventListener('click', () => canvasStudio.classList.replace('opacity-100', 'opacity-0'), canvasStudio.classList.add('pointer-events-none'));

    toolBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        currentMode = btn.getAttribute('data-tool');
        toolBtns.forEach(b => b.classList.remove('ring-4', 'ring-gray-900'));
        btn.classList.add('ring-4', 'ring-gray-900');
      });
    });

    function getPos(e) {
      var rect = isolatedCanvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (isolatedCanvas.width / rect.width),
        y: (e.clientY - rect.top) * (isolatedCanvas.height / rect.height)
      };
    }

    isolatedCanvas.addEventListener('mousedown', (e) => { isDrawing = true; var pos = getPos(e); lastX = pos.x; lastY = pos.y; ctx.beginPath(); ctx.moveTo(lastX, lastY); });
    isolatedCanvas.addEventListener('mousemove', (e) => {
      if(!isDrawing) return;
      var pos = getPos(e);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.lineWidth = widthSlider.value * (currentMode === 'eraser' ? 2.5 : 0.5);
      ctx.strokeStyle = currentMode === 'eraser' ? '#FFFFFF' : '#111827';
      if(currentMode === 'rainbow') ctx.strokeStyle = `hsl(${Date.now() % 360}, 100%, 50%)`;
      ctx.lineTo(pos.x, pos.y); ctx.stroke();
      lastX = pos.x; lastY = pos.y;
    });
    window.addEventListener('mouseup', () => { if(isDrawing) { isDrawing = false; ctx.closePath(); } });
  })();
</script>
